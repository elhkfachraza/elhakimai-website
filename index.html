<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElhakimAI | System Maintenance</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #020204; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        /* Animasi Glitch Lembut */
        .glitch-text {
            position: relative;
            display: inline-block;
        }
        
        /* Bar Progress Animasi Shimmer */
        .shimmer-bar {
            background: linear-gradient(90deg, #4f46e5 0%, #a855f7 50%, #4f46e5 100%);
            background-size: 200% auto;
            animation: move-shimmer 2s linear infinite;
        }

        @keyframes move-shimmer {
            to { background-position: 200% center; }
        }

        /* Glow Effects */
        .glow-circle {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .gear-spin { animation: spin 8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Floating Animation */
        .floating {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glow-circle top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
    <div class="fixed top-0 left-0 w-full h-full opacity-10 pointer-events-none" style="background-image: radial-gradient(#4f46e5 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>

    <div class="max-w-3xl w-full text-center relative z-10">
        
        <div class="mb-8 flex justify-center">
            <div class="relative w-24 h-24 bg-indigo-600/10 rounded-[30px] flex items-center justify-center border border-indigo-500/20 floating">
                <i class="fas fa-robot text-4xl text-indigo-500"></i>
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-black border border-indigo-500/30 rounded-full flex items-center justify-center">
                    <i class="fas fa-wrench text-xs text-indigo-400 gear-spin"></i>
                </div>
            </div>
        </div>

        <div class="inline-flex items-center gap-2 bg-indigo-500/5 border border-indigo-500/20 px-5 py-2 rounded-full mb-6">
            <span class="flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-indigo-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
            </span>
            <span class="text-[10px] font-black tracking-[0.3em] uppercase text-indigo-400">System Integration v5.0</span>
        </div>

        <h1 class="text-4xl md:text-7xl font-black mb-6 tracking-tighter leading-none italic uppercase">
            WEBSITE ON <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500">MAINTENANCE</span>
        </h1>
        
        <p class="text-gray-400 text-lg mb-10 max-w-lg mx-auto leading-relaxed">
            Kami sedang membangun ulang sistem <span class="font-mono text-white">Backend di GitHub</span> untuk performa dashboard yang lebih stabil dan cepat.
        </p>

        <div class="max-w-md mx-auto mb-12">
            <div class="flex justify-between mb-3 text-[10px] font-bold uppercase tracking-widest text-gray-500 italic">
                <span>Deploying Code...</span>
                <span>78% Complete</span>
            </div>
            <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                <div class="shimmer-bar h-full w-[78%]"></div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row items-center justify-center gap-5">
            <a href="https://discord.gg/yourlink" target="_blank" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 text-white px-10 py-4 rounded-2xl font-black transition-all flex items-center justify-center gap-3 shadow-lg shadow-indigo-600/20">
                <i class="fab fa-discord text-xl"></i> DISCORD SUPPORT
            </a>
            <div class="flex gap-3">
                <a href="#" class="w-14 h-14 bg-white/5 border border-white/5 rounded-2xl flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-all">
                    <i class="fab fa-instagram text-xl"></i>
                </a>
                <a href="#" class="w-14 h-14 bg-white/5 border border-white/5 rounded-2xl flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-all">
                    <i class="fab fa-youtube text-xl"></i>
                </a>
            </div>
        </div>

        <div class="mt-24 pt-8 border-t border-white/5 opacity-30">
            <div class="flex flex-col md:flex-row justify-center gap-6 text-[10px] font-mono tracking-widest uppercase italic">
                <span class="flex items-center gap-2"><i class="fas fa-database text-indigo-500"></i> Linking Database</span>
                <span class="hidden md:inline">•</span>
                <span class="flex items-center gap-2"><i class="fab fa-github text-white"></i> Deploying Repositories</span>
            </div>
        </div>
    </div>

</body>
</html>
